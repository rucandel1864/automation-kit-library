<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Meeting Notes Kit cover</title>
  <desc id="desc">Product cover for an AI meeting notes to action plan workflow kit.</desc>
  <rect width="1200" height="675" fill="#f5f6f2"/>
  <rect x="70" y="70" width="1060" height="535" rx="22" fill="#ffffff" stroke="#d9ded5" stroke-width="3"/>
